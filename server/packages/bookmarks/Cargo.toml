[package]
name = "bookmarks"
version.workspace = true
edition.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# runtime
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

# graphql
async-graphql = { workspace = true, features = ["bigdecimal"] }
axum = { workspace = true, features = ["query"] }
async-graphql-axum.workspace = true
serde_json.workspace = true

# fetch content
serde.workspace = true
reqwest = { workspace = true, features = ["gzip", "stream"] }

# database
diesel = { workspace = true, features = ["postgres", "time", "r2d2", "numeric"] }
time.workspace = true
bigdecimal = "0.4.10"
graphql-common.workspace = true

# error
anyhow.workspace = true
thiserror.workspace = true

# cors
middleware = { workspace = true, features = ["cors", "trace", "graphql-trace"] }

# log
tracing.workspace = true
tracing-subscriber.workspace = true

# thrift
thrift.workspace = true
volo-thrift.workspace = true

# novel
novel_crawler.workspace = true

[dev-dependencies]
# env
dotenv.workspace = true
