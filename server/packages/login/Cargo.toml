[package]
name = "login"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# http
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
axum = { version = "0.8.9", features = ["json"] }

# error
anyhow = "1.0.102"
thiserror = "2.0.18"

# json
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

# cors
middleware = { path = "../../common/middleware", features = ["cors", "trace"] }

# log
tracing = "0.1.44"
tracing-subscriber = "0.3.23"

# thrift
thrift = { path = "../../common/thrift" }
volo-thrift = "0.12.4"

# webauthn
webauthn-rs = { version = "0.5.5", features = ["danger-allow-state-serialisation"] }
url = "2.5.8"

[dev-dependencies]
axum = { version = "0.8.9", features = ["json", "macros"] }
